[package]
name = "wealthvault-engine"
version = "0.1.0"
edition = "2021"

[lib]
name = "wealthvault_engine"
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }

[profile.release]
opt-level = 3